<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./pages/index.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Проектная работа номер четыре Ильи Разумцева">
  <meta name="author" content="Илья Разумцев">
  <title>Место Россия</title>
</head>

<body class="page">

  <div class="page__container">

    <header class="header">
      <img src="./blocks/header/__image/logo.svg" class="header__image" alt="Логотип сайта.">
      <div class="header__line"></div>
    </header>
    
    <main class="content">

      <section class="profile">
        <div class="profile__avatar"></div>
        <div class="profile__info">
          <p class="profile__name">Жак-Ив Кусто</p>
          <p class="profile__feature">Исследователь океана</p>
          <div class="profile__edit-button"></div>
        </div>
        <div class="profile__add-button"></div>
      </section>

      <section class="elements">
        <ul class="elements__content">
          <li class="element">
            <img class="element__photo" src="./blocks/element/images/tower-and-factory.jpg" alt="Преземистая крепостная башня, закрывающая водный путь в город.">
            <div class="element__content">
              <h2 class="element__title">Плоская башня</h2>
              <div class="element__like"></div>
            </div>
          </li>
          <li class="element">
            <img class="element__photo" src="./blocks/element/images/cathedral.jpg" alt="Улица ведет к собору с золотым куполом, устремленным в небо.">
            <div class="element__content">
              <h2 class="element__title">Троицкий собор</h2>
              <div class="element__like"></div>
            </div>
          </li>
          <li class="element">
            <img class="element__photo" src="./blocks/element/images/bell-tower.jpg" alt="Изящная колокольня собора за высокой крепостной стеной.">
            <div class="element__content">
              <h2 class="element__title">Колокольня собора</h2>
              <div class="element__like"></div>
            </div>
          </li>
          <li class="element">
            <img class="element__photo" src="./blocks/element/images/moon.jpg" alt="Луна крупным планом, застигнутая средь бела дня.">
            <div class="element__content">
              <h2 class="element__title">Псковская луна</h2>
              <div class="element__like"></div>
            </div>
          </li>
          <li class="element">
            <img class="element__photo" src="./blocks/element/images/crossroads.jpg" alt="Развилка - две стрелки, три пути.">
            <div class="element__content">
              <h2 class="element__title">Распутье</h2>
              <div class="element__like"></div>
            </div>
          </li>
          <li class="element">
            <img class="element__photo" src="./blocks/element/images/stump.jpg" alt="Треугольный пень в лесу.">
            <div class="element__content">
              <h2 class="element__title">Земная ось</h2>
              <div class="element__like"></div>
            </div>
          </li>
        </ul>
      </section>

    </main>

    <footer class="footer">
      <a class="footer__copyright" href="#" target="_self">&copy; 2021 Mesto Russia</a>
    </footer>

  </div>

</body>

</html>
