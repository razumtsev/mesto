<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./pages/index.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Проектная работа номер четыре Ильи Разумцева">
  <meta name="author" content="Илья Разумцев">
  <title>Место Россия</title>
</head>

<body class="page">

  <div class="page__container">

    <header class="header">
      <a href="#" target="_self"><img class="header__logo" src="./blocks/header/__logo/logo.svg" alt="Логотип сайта."></a>
    </header>
    
    <main class="content">

      <section class="profile">
        <div class="profile__avatar"></div>
        <div class="profile__info">
          <h1 class="profile__name">Жак-Ив Кусто</h1>
          <p class="profile__occupation">Исследователь океана</p>
          <button class="button button_type_edit-profile" type="button" aria-label="редактировать данные профиля"></button>
        </div>
        <button class="button button_type_add-card" type="button" aria-label="добавить карточку"></button>
      </section>

      <section class="cards">
        <ul class="cards__content">
          <li class="card">
            <img class="card__photo" src="./blocks/card/images/tower-and-factory.jpg" alt="Преземистая крепостная башня, закрывающая водный путь в город.">
            <div class="card__content">
              <h2 class="card__title">Плоская башня</h2>
              <button class="button button_type_like" type="button" aria-label="поставить лайк"></button>
            </div>
          </li>
          <li class="card">
            <img class="card__photo" src="./blocks/card/images/cathedral.jpg" alt="Улица ведет к собору с золотым куполом, устремленным в небо.">
            <div class="card__content">
              <h2 class="card__title">Троицкий собор</h2>
              <button class="button button_type_like" type="button" aria-label="поставить лайк"></button>
            </div>
          </li>
          <li class="card">
            <img class="card__photo" src="./blocks/card/images/bell-tower.jpg" alt="Изящная колокольня собора за высокой крепостной стеной.">
            <div class="card__content">
              <h2 class="card__title">Колокольня собора</h2>
              <button class="button button_type_like" type="button" aria-label="поставить лайк"></button>
            </div>
          </li>
          <li class="card">
            <img class="card__photo" src="./blocks/card/images/moon.jpg" alt="Луна крупным планом, застигнутая средь бела дня.">
            <div class="card__content">
              <h2 class="card__title">Псковская луна</h2>
              <button class="button button_type_like" type="button" aria-label="поставить лайк"></button>
            </div>
          </li>
          <li class="card">
            <img class="card__photo" src="./blocks/card/images/crossroads.jpg" alt="Развилка - две стрелки, три пути.">
            <div class="card__content">
              <h2 class="card__title">Распутье</h2>
              <button class="button button_type_like" type="button" aria-label="поставить лайк"></button>
            </div>
          </li>
          <li class="card">
            <img class="card__photo" src="./blocks/card/images/stump.jpg" alt="Треугольный пень в лесу.">
            <div class="card__content">
              <h2 class="card__title">Земная ось</h2>
              <button class="button button_type_like" type="button" aria-label="поставить лайк"></button>
            </div>
          </li>
        </ul>
      </section>

    </main>

    <footer class="footer">
      <p class="footer__copyright">&copy; 2021 Mesto Russia</p>
    </footer>

    <article class="popup">
      <form class="popup__container" name="profile">
        <h2 class="popup__name">Редактировать профиль</h2>
        <input class="popup__input popup__input_type_name" type="text" name="nickname" value="" placeholder="Имя" required>
        <input class="popup__input popup__input_type_occupation" type="text" name="occupation" placeholder="Род занятий" value="" required>
        <button class="button button_type_save" type="submit" aria-label="сохранить данные">Сохранить</button>
        <button class="button button_type_close" type="button" aria-label="закрыть всплывающее окно"></button>
      </form>
    </article>

  </div>

<script src="./scripts/script.js"></script>
</body>

</html>
